<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivi - Bags & Accessories</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Vivi</h1>
    <p>Trendy Bags, Slippers & Accessories in Accra</p>
    <button id="cart-btn">Cart (<span id="cart-count">0</span>)</button>
  </header>

  <section class="products">
    <h2>Featured Products</h2>
    
    <div class="product">
      <img src="bag1.jpg" alt="Denim Pink Handle Bag">
      <h3>Denim Pink Handle Bag</h3>
      <p>GHS 250</p>
      <button onclick="addToCart('Denim Pink Handle Bag', 250)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="slippers1.jpg" alt="Designer Chain Slippers">
      <h3>Designer Chain Slippers</h3>
      <p>GHS 200 <br><small>Size 40 only</small></p>
      <button onclick="addToCart('Designer Chain Slippers Size 40', 200)">Add to Cart</button>
    </div>
  </section>

  <div id="cart-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <h3>Total: GHS <span id="cart-total">0</span></h3>
      <button id="whatsapp-btn">Order via WhatsApp</button>
      <button id="paystack-btn">Pay with MoMo</button>
    </div>
  </div>

  <footer>
    <p>WhatsApp: 0554278079 | Delivery across Ghana | Vivi © 2026</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
